name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --workspaces

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install wait-on
        run: npm install -g wait-on
      - name: Start backend server
        run: |
          npm run dev > /tmp/backend.log 2>&1 &
          echo "Backend PID: $!"
        working-directory: backend

      - name: Wait for backend
        run: |
          sleep 30
          echo "=== Backend log ==="
          cat /tmp/backend.log
          echo "=== Port check ==="
          ss -tlnp | grep 3001 || echo "Nothing listening on port 3001"
          echo "=== Process check ==="
          ps aux | grep node | grep -v grep || echo "No node process running"
      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:3001/api/health --timeout 30000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend
      - name: Run Playwright tests
        run: npm run test:e2e --workspace frontend
      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
