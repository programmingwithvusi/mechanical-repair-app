services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 3001
      DB_PATH: /data/app.db
    volumes:
      - sqlite_data:/data          # persists the DB file across restarts
    ports:
      - "3001:3001"                # exposed for direct API access / debugging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy  # wait for backend to pass health check
    restart: unless-stopped

volumes:
  sqlite_data:                     # named volume — survives container rebuilds