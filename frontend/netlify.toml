[build]
  base = "frontend"
  command = "npm run test:e2e && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://mechanical-repair-app.onrender.com"

[[plugins]]
  package = "@netlify/plugin-playwright"

[[redirects]]
  from = "/qa"
  to = "/playwright-report/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://mechanical-repair-app.onrender.com/:splat"
  status = 200
  force = true