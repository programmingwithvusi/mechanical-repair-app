[build]
  base = "frontend"
  command = "npm install -D @netlify/plugin-playwright && npm run build && npm run test:e2e:report"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-playwright"

# Route for Playwright report
[[redirects]]
  from = "/qa"
  to = "/playwright-report/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://mechanical-repair-app.onrender.com/:splat"
  status = 200
  force = true

