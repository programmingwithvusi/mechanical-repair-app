[build]
  base = "frontend"
  command = "npm run build && npm run test:e2e:report"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-playwright"

[[redirects]]
  from = "/qa"
  to = "/playwright-report/index.html"
  from = "/api/*"
  to = "https://mechanical-repair-app.onrender.com/:splat"
  status = 200
  force = true

